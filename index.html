<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPI フラッシュカード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root { --ink:#1a1a2e; --paper:#f5f0e8; --accent2:#2c3e6b; --gold:#c9a84c; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--ink); min-height:100vh; font-family:'Noto Sans JP',sans-serif; display:flex; flex-direction:column; align-items:center; padding:24px 16px;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(44,62,107,0.4) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(192,57,43,0.2) 0%,transparent 50%); }
header{ text-align:center; margin-bottom:24px; }
.title{ font-family:'Noto Serif JP',serif; font-size:clamp(22px,5vw,32px); color:var(--paper); letter-spacing:0.1em; font-weight:700; }
.subtitle{ color:var(--gold); font-size:11px; letter-spacing:0.2em; text-transform:uppercase; margin-top:4px; }
.tabs{ display:flex; gap:6px; margin-bottom:18px; background:rgba(255,255,255,0.05); border-radius:12px; padding:4px; }
.tab-btn{ background:transparent; border:none; color:rgba(245,240,232,0.45); font-family:'Noto Sans JP',sans-serif; font-size:13px; padding:8px 18px; border-radius:8px; cursor:pointer; transition:all 0.2s; }
.tab-btn.active{ background:var(--accent2); color:var(--paper); }
.progress-wrap{ width:100%; max-width:520px; margin-bottom:14px; display:flex; align-items:center; gap:12px; }
.progress-bar{ flex:1; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
.progress-fill{ height:100%; background:linear-gradient(90deg,var(--accent2),var(--gold)); border-radius:2px; transition:width 0.4s ease; }
.progress-text{ color:rgba(245,240,232,0.45); font-size:12px; white-space:nowrap; min-width:60px; text-align:right; }
.result-badges{ display:flex; gap:8px; font-size:12px; margin-bottom:14px; }
.badge{ padding:4px 12px; border-radius:50px; font-weight:600; }
.badge-ok{ background:rgba(46,160,67,0.2); color:#5dbb75; border:1px solid rgba(46,160,67,0.3); }
.badge-ng{ background:rgba(192,57,43,0.2); color:#e07070; border:1px solid rgba(192,57,43,0.3); }
.badge-rem{ background:rgba(201,168,76,0.15); color:var(--gold); border:1px solid rgba(201,168,76,0.3); }
.card-scene{ width:100%; max-width:520px; height:360px; perspective:1200px; margin-bottom:20px; cursor:pointer; }
.card-inner{ position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform 0.5s cubic-bezier(0.4,0,0.2,1); }
.card-inner.flipped{ transform:rotateY(180deg); }
.card-face{ position:absolute; inset:0; border-radius:20px; backface-visibility:hidden; display:flex; flex-direction:column; overflow:hidden; }
.card-front{ background:var(--paper); box-shadow:0 20px 60px rgba(0,0,0,0.2),0 4px 12px rgba(0,0,0,0.1); }
.card-back{ background:var(--accent2); transform:rotateY(180deg); box-shadow:0 20px 60px rgba(0,0,0,0.3),0 4px 12px rgba(0,0,0,0.15); }
.card-top{ padding:12px 20px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.card-front .card-top{ border-bottom:1px solid rgba(0,0,0,0.07); }
.card-back .card-top{ border-bottom:1px solid rgba(255,255,255,0.1); }
.card-label{ font-size:10px; letter-spacing:0.15em; text-transform:uppercase; font-weight:600; }
.card-front .card-label{ color:rgba(26,26,46,0.3); }
.card-back .card-label{ color:rgba(245,240,232,0.45); }
.card-num{ font-size:11px; font-weight:600; }
.card-front .card-num{ color:rgba(26,26,46,0.25); }
.card-back .card-num{ color:rgba(245,240,232,0.35); }
.card-body{ flex:1; display:flex; flex-direction:column; padding:16px 22px; gap:8px; overflow-y:auto; justify-content:center; }
.problem-text{ font-family:'Noto Serif JP',serif; font-size:clamp(12px,1.9vw,14px); color:var(--ink); line-height:1.9; white-space:pre-wrap; }
.question-box{ background:rgba(44,62,107,0.1); border-left:3px solid var(--accent2); border-radius:0 8px 8px 0; padding:9px 13px; font-size:clamp(12px,1.9vw,14px); color:#1a2a4a; line-height:1.65; font-weight:600; white-space:pre-wrap; }
.tap-hint{ font-size:11px; color:rgba(26,26,46,0.28); letter-spacing:0.1em; text-align:center; margin-top:4px; }
.answer-text{ font-family:'Noto Serif JP',serif; font-size:clamp(16px,3vw,24px); color:var(--gold); font-weight:700; line-height:1.5; text-align:center; white-space:pre-wrap; overflow-y:auto; }
.result-btns{ display:none; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:12px; }
.result-btns.show{ display:flex; }
.controls{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center; }
.btn{ background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); color:var(--paper); font-family:'Noto Sans JP',sans-serif; font-size:13px; padding:11px 22px; border-radius:50px; cursor:pointer; transition:all 0.2s; letter-spacing:0.05em; }
.btn:hover{ background:rgba(255,255,255,0.13); transform:translateY(-1px); }
.btn-primary{ background:var(--accent2); border-color:var(--accent2); font-weight:600; }
.btn-primary:hover{ background:#3a5280; border-color:#3a5280; }
.btn-ok{ background:rgba(46,160,67,0.25); border-color:rgba(46,160,67,0.4); color:#5dbb75; font-weight:600; }
.btn-ok:hover{ background:rgba(46,160,67,0.4); }
.btn-ng{ background:rgba(192,57,43,0.2); border-color:rgba(192,57,43,0.4); color:#e07070; font-weight:600; }
.btn-ng:hover{ background:rgba(192,57,43,0.35); }
.done-screen{ display:none; flex-direction:column; align-items:center; gap:16px; color:var(--paper); text-align:center; padding:40px 20px; }
.done-screen.show{ display:flex; }
.done-title{ font-family:'Noto Serif JP',serif; font-size:28px; color:var(--gold); }
.done-stats{ font-size:14px; color:rgba(245,240,232,0.6); line-height:2.2; }
</style>
</head>
<body>
<header>
  <div class="title">SPI フラッシュカード</div>
  <div class="subtitle">Flash Cards · 451 問</div>
</header>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('all')">全問</button>
  <button class="tab-btn" onclick="switchTab('言語')">言語</button>
  <button class="tab-btn" onclick="switchTab('非言語')">非言語</button>
  <button class="tab-btn" onclick="switchTab('wrong')">間違えた問題</button>
</div>
<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
  <div class="progress-text" id="pText">1 / 1</div>
</div>
<div class="result-badges">
  <span class="badge badge-ok" id="badgeOk">✓ 0</span>
  <span class="badge badge-ng" id="badgeNg">✗ 0</span>
  <span class="badge badge-rem" id="badgeRem">☆ 0</span>
</div>
<div id="mainArea">
  <div class="card-scene" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-top">
          <span class="card-label" id="frontLabel">問題</span>
          <span class="card-num" id="frontNum">#1</span>
        </div>
        <div class="card-body" id="frontBody"></div>
      </div>
      <div class="card-face card-back">
        <div class="card-top">
          <span class="card-label" style="color:rgba(245,240,232,0.45)">答え</span>
          <span class="card-num" id="backNum">#1</span>
        </div>
        <div class="card-body" id="backBody"></div>
      </div>
    </div>
  </div>
  <div class="result-btns" id="resultBtns">
    <button class="btn btn-ng" onclick="markResult('ng')">✗ 不正解</button>
    <button class="btn" onclick="markResult('skip')">→ スキップ</button>
    <button class="btn btn-ok" onclick="markResult('ok')">✓ 正解</button>
  </div>
  <div class="controls">
    <button class="btn" onclick="prevCard()">← 前へ</button>
    <button class="btn" onclick="shuffleDeck()">🔀 シャッフル</button>
    <button class="btn btn-primary" onclick="nextCard()">次へ →</button>
  </div>
</div>
<div class="done-screen" id="doneScreen">
  <div class="done-title">完了！</div>
  <div class="done-stats" id="doneStats"></div>
  <button class="btn btn-primary" onclick="restartDeck()">もう一度</button>
  <button class="btn" onclick="reviewWrong()">間違えた問題を復習</button>
</div>

の3科目を一緒にしたときの平均点が61.0点のとき、Sクラスの生物の受験者数（ウ）は何人か。", "answer": "G(18人)"}, {"category": "非言語", "problem": "ある家庭のワインセラーには、赤、白、ロゼの3種類のワインがそれぞれ1本以上ある。それぞれの本数について、つぎのことがわかっている。", "question": "つぎの推論ア、イについて、必ず正しいか、あるいはどちらともいえないかを考え、AからIまでの中から正しいものを1つ選びなさい。", "answer": "G(アは誤りだが、イは正しい）"}, {"category": "非言語", "problem": "ある家庭のワインセラーには、赤、白、ロゼの3種類のワインがそれぞれ1本以上ある。それぞれの本数について、つぎのことがわかっている。", "question": "つぎの推論力、キについて、必ず正しいか、必ず誤りか、あるいはどちらともいえないかを考え、Aから1までの中から正しいものを1つ選びなさい。", "answer": "E(カもキもどちらともいえない)"}, {"category": "非言語", "problem": "横一列に並んだ5つの席があり、P、Q.R,S, Tの5人がくじ引きで座る席を決める。", "question": "PとQの2人が両端の席に座る確率はどれだけか。", "answer": "F(1/10)"}, {"category": "非言語", "problem": "横一列に並んだ5つの席があり、P、Q.R,S, Tの5人がくじ引きで座る席を決める。", "question": "RとSの間に1人座る確率はどれだけか。", "answer": "I(3/10)"}, {"category": "非言語", "problem": "ある人が花壇にスズランとヒヤシンスとチューリップの3種類の花を植えることにした。花壇全体の面積の1/4にスズランを植えた。", "question": "スズランを植えた面積の5/4倍の面積にヒヤシンスを植え、残りの面積にチューリップを植えるとすると、チューリップを植える面積は花壇全体のどれだけか。", "answer": "D(7/16）"}, {"category": "非言語", "problem": "ある人が花壇にスズランとヒヤシンスとチューリップの3種類の花を植えることにした。花壇全体の面積の1/4にスズランを植えた。", "question": "花壇全体の面積の5/12にヒヤシンスを植え、まだ何も植えていないところに白と黄のチューリップを3：5の割合で植えたい。白のチューリップを植える面積は花壇全体のどれだけか。", "answer": "B(1/8）"}, {"category": "非言語", "problem": "バスケットボールの練習で、P,Q.R.S.Tの5人がそれぞれ5本ずつシュートを打った。5人が決めたシュートの本数について、つぎのことがわかっている。", "question": "仮にTが決めたシュートの本数が3本以上だとすると、Rが決めた本数として考えられるのはどれか。あてはまるものをすべて選びなさい。", "answer": "0,1,2"}, {"category": "非言語", "problem": "バスケットボールの練習で、P,Q.R.S.Tの5人がそれぞれ5本ずつシュートを打った。5人が決めたシュートの本数について、つぎのことがわかっている。", "question": "仮にPが決めたシュートの本数がQより多いとすると、Tが決めた本数として考えられるのはどれか。あてはまるものをすべて選びなさい。", "answer": "0,1,2,5"}, {"category": "非言語", "problem": "P，Q，R，S，Tの5人が待ち合わせをした。この待ち合わせについて、つぎのことがわかっている。", "question": "Tが来た順番として考えられるのはどこか。あてはまるものをすべて選びなさい。", "answer": "真ん中以外"}, {"category": "非言語", "problem": "P，Q，R，S，Tの5人が待ち合わせをした。この待ち合わせについて、つぎのことがわかっている。", "question": "I）からIV）までの情報に加えて、QがTよりも早く来たことがわかった。このとき、Rが来た順番として考えられるのはどこか。あてはまるものをすべて選びなさい。", "answer": "右から1,2番目"}, {"category": "非言語", "problem": "2階建てのアパ ory": "非言語", "problem": "商品Qを、仕入れた個数の2/3は仕入れ値の15%の利益をのせて、残りは仕入れ値の10%の利益をのせてすべて売ったところ、合計で3500円の利益が得られた。商品Qの仕入れ値は合計でいくらか。", "question": "正しいものを選べ", "answer": "C(26250円)"}, {"category": "非言語", "problem": "表は、P,Q,R,Sの4カ国それぞれについて、ある年の一次エネルギー総供給に占める各エネルギーの割合を示したものである。", "question": "表中の空欄［　］は何%か。", "answer": "D(15.3%)"}, {"category": "非言語", "problem": "表は、P,Q,R,Sの4カ国それぞれについて、ある年の一次エネルギー総供給に占める各エネルギーの割合を示したものである。", "question": "Q国の二次エネルギー総供給量は石油換算で33900万tである。Q国の石炭によるエネルギーの供給量は石油換算で何万tか。（必要なときは、最後に千の位を四捨五入すること）。", "answer": "C(2271万ｔ)"}, {"category": "非言語", "problem": "表は、P,Q,R,Sの4カ国それぞれについて、ある年の一次エネルギー総供給に占める各エネルギーの割合を示したものである。", "question": "R国の一次エネルギー総供給から、石油によるエネルギーを除いた残りのエネルギーについてあらためて割合を求めたとすると、天然ガスによるエネルギーの割合は何%か（必要なときは、最後に小数点以下第2位を四捨五入すること）。", "answer": "C(19.2%)"}, {"category": "非言語", "problem": "表は、P,Q,R,Sの4カ国それぞれについて、ある年の一次エネルギー総供給に占める各エネルギーの割合を示したものである。", "question": "S国の石油によるエネルギーのうち、15.0%は輸入された石油によるものである。S国の一次エネルギー総供給のうち、国内で産出された石油によるエネルギーの割合は何%か（必要なときは、最後に小数点以下第2位を四捨五入すること）。", "answer": "G(32.6%)"}, {"category": "非言語", "problem": "下表は、P町を出発してQ町に停車し、R町に至るバスの時刻表である。ただし、PQ町間の距離は20kmである。", "question": "QR町間のバスの平均時速は30km/時であった。QR町間の距離はどれだけか（必要なときは、最後に小数点以下第2位を四捨五入すること）。", "answer": "H(17.5㎞)"}, {"category": "非言語", "problem": "下表は、P町を出発してQ町に停車し、R町に至るバスの時刻表である。ただし、PQ町間の距離は20kmである。", "question": "甲が8時35分にQ町からR町に向かって自転車で出発したところ、Q町から7.5kmの地点でこのバスに追い越された。QR町間のバスの平均時速は30km/時であるとすると、QR町間の甲の平均時速はどれだけか（必要なときは、最後に小数点以下第2位を四捨五入すること）。", "answer": "C(15.0㎞/時)"}, {"category": "非言語", "problem": "A.B,C.Dの4つのサッカーチームが総あたり戦を行った結果、それぞれの勝ち点の合計について、つぎのことがわかった。ただし勝ち点は、試合に勝った場合3点、引き分けた場合1点、負けた場合0点として計算する。", "question": "仮にAの勝ち点が4点、Cの勝ち点が3点とすると、Dの勝ち点は何点と考えられるか。あてはまるものをすべて選びなさい。", "answer": "7点"}, {"category": "非言語", "problem": "A.B,C.Dの4つのサッカーチームが総あたり戦を行った結果、それぞれの勝ち点の合計について、つぎのことがわかった。ただし勝ち点は、試合に勝った場合3点、引き分けた場合1点、負けた場合0点として計算する。", "question": "仮にDはAとCに勝ち、Bと引き分けたとすると、Aの勝ち点は何点と考えられるか。あてはまるものをすべて選びなさい。", "answer": "4点"}, {"category": "非言語", "problem": "あるクラスで文化祭の出し物について事前アンケートを行ったところ、X案支持者が40%，Y案支持者が20%、2案支持者が15%で、残りはまだ決めていない人だった。この後、クラスで討論して、最終的に投票で決定することにした。", "question": "X案支持者の85%とY案支持者の25%が、討論後にはX案に投票した。事前アンケートでX案、Y案を支持していた人のうち、討論後にX案に投票した人は何%か（必要なときは、最後に小数点以下第1位を四捨五入すること）。", "answer": "H(65%)"}, {"category": "非言語", "problem": "あるクラスで文化祭の出し物について事前アンケートを行ったところ、X案支持者が40%，Y案支持者が20%、2案支持者が15%で、残りはまだ決めていない人だった。この後、クラスで討論して、最終的に投票で決定することにした。", "question": "クラス全体では13%，Z案支持者の80%が、討論後にはZ案に投票した。X案、Y案支持者でZ案に投票した人はいなかった。事前アンケートでまだ決めていなかった人のうち、Z案に投票した人は何%か（必要なときは、最後に小数点以下第1位を四捨五入すること）。", "answer": "D(4%)"}, {"category": "非言語", "problem": "P,Q. R, Sの4チームが総当たりで1回ずつサッカーの試合をした。全6試合の結果について、つぎのことがわかっている。", "question": "I）からIV）までの情報から判断して、つぎの推論ア、ウのうち，必ずしも誤りとはいえないものほどれか。AからHまでの中から1つ選びなさい。", "answer": "D(アとイの両方)"}, {"category": "非言語", "problem": "P,Q. R, Sの4チームが総当たりで1回ずつサッカーの試合をした。全6試合の結果について、つぎのことがわかっている。", "question": "最も少ない情報で4チームの対戦結果がすべてわかるためには、I）からⅣ)までの情報のほかに、つぎの力、キ、クのうちどれが加わればよいか。AからHまでの中から1つ選びなさい。", "answer": "D(カとキの両方)"}, {"category": "非言語", "problem": "ある商店で、商品P、Qを販売する。", "question": "商品Pを定価で売ると仕入れ値の35%の利益が得られる。商品Pを定価の10%引きで売るときの利益は、仕入れ値の何%か（必要なときは、最後に小数点以下第1位を四捨五入すること）。", "answer": "B(22％）"}, {"category": "非言語", "problem": "ある商店で、商品P、Qを販売する。", "question": "商品Qを定価の30%引きで売っても利益が出るようにするためには、仕入れ値に少なくとも何%の利益をのせて定価を定めればよいか（必要なときは、最後に小数点以下第1位を四捨五入すること）。", "answer": "I(43％)"}, {"category": "非言語", "problem": "ある中学校では、生徒が体育系、文化系のクラブにそれぞれ1つずつまで所属することができる。この学校で、生徒90人にクラブ活動に関する調査を行ったところ、つぎのことがわかった。", "question": "文化系のクラブのみに所属している生徒は何人か。", "answer": "E(27人)"}, {"category": "非言語", "problem": "ある中学校では、生徒が体育系、文化系のクラブにそれぞれ1つずつまで所属することができる。この学校で、生徒90人にクラブ活動に関する調査を行ったところ、つぎのことがわかった。", "question": "球技のクラブに所属している生徒のうち2/3の生徒が文化系のクラブにも所属している。体育系のクラブのみに所属している生徒の中で、球技以外のクラブに所属している生徒は何人か。", "answer": "I(48人)"}, {"category": "非言語", "problem": "ある中学校では、生徒が体育系、文化系のクラブにそれぞれ1つずつまで所属することができる。この学校で、生徒90人にクラブ活動に関する調査を行ったところ、つぎのことがわかった。", "question": "文化系クラブと、体育系で技以外のクラブの両方に所属している生徒は、体育系クラブに所属している生徒の何%を占めるか（必要なときは、最後に小数点以下第1位を四捨五入すること）。", "answer": "G(20%)"}, {"category": "非言語", "problem": "商品Pを400個仕入れ、1個300円ですべて売ったところ、総額で18000円の利益を得た。商品Pの1個あたりの仕入れ値はいくらか。", "question": "正しいものを選べ", "answer": "D(255円)"}, {"category": "非言語", "problem": "1個あたりの仕入れ値が500円の商品Qを300個仕入れた。そのうち100個を定価の1割引きで、200個を定価の2割引きで売ったときの利益が総額で12500円となるようにしたい。商品Qの定価をいくらにすればよいか。", "question": "正しいものを選べ", "answer": "F(650円)"}, {"category": "非言語", "problem": "P.Q. R,S, Tの5人の生徒が教室を清掃する。", "question": "5人それぞれが音楽室、美術室のどちらかを担当して2つの教室を清する。」このとき、だれがどの教室を担当するか、その組み合わせは何通りか。", "answer": "F(30通り)"}, {"category": "非言語", "problem": "P.Q. R,S, Tの5人の生徒が教室を清掃する。", "question": "5人それぞれが音楽室、美術室、調理室のうちの1つを担当して3つの教室を清掃する。このとき、だれがどの教室を担当するか、その組み合わせは何通りか。", "answer": "I(150通り)"}, {"category": "非言語", "problem": "ある劇団が100人まで入れるホールで公演を3回行った。このときの観客数について、以下のことがわかっている。", "question": "つぎの推論ア、イについて、必ず正しいか、必ず誤りか、あるいはどちらともいえないかを考え、Aから1までの中から正しいものを1つ選びなさい。", "answer": "F(アはどちらともいえないが、イは誤り)"}, {"category": "非言語", "problem": "ある劇団が100人まで入れるホールで公演を3回行った。このときの観客数について、以下のことがわかっている。", "question": "つぎの推論カ、キについて、必ず正しいか、必ず誤りか、あるいはどちらともいえないかを考え、Aから Iまでの中から正しいものを1つ選びなさい", "answer": "G(カは誤りだが、キは正しい)"}, {"category": "非言語", "problem": "表はある高速バスチケットの一般料金を示したもので、学生料金は一般料金の20%引きになる。さらに、早期購入割引でチケットを購入する場合は、一般料金や学生料金の5%引きになる。", "question": "区間Xのチケットを早期購入割引で10人分購入したところ。合計金額は43700円だった。このとき、10人のうち学生は何人か。", "answer": "D(4人)"}, {"category": "非言語", "problem": "表はある高速バスチケットの一般料金を示したもので、学生料金は一般料金の20%引きになる。さらに、早期購入割引でチケットを購入する場合は、一般料金や学生料金の5%引きになる。", "question": "学生7人が区間2のチケットを早期購入割引で購入したがキャンセルし、区間Yのチケットを当日に購入し直したところ，支払い額が11060円安くなった。このとき、表中の空欄［　］はいくらか。ただし、キャンセル料はかからなかったものとする。", "answer": "E(10500円)"}, {"category": "非言語", "problem": "P,Q, R,Sの4人は、それぞれ毎週1回決まった曜日に運動することにしている。4人の運動する日について、つぎのことがわかっている。", "question": "仮にQはPが運動した翌日に運動したとする。このとき、Pが運動する日として考えられるのは何曜日か。あてはまるものをすべて選びなさい。", "answer": "日、月、木、金"}, {"category": "非言語", "problem": "P,Q, R,Sの4人は、それぞれ毎週1回決まった曜日に運動することにしている。4人の運動する日について、つぎのことがわかっている。", "question": "仮にQはRが運動した2日後に運動したとする。このとき、Rが運動する日として考えられるのは何曜日か。あてはまるものをすべて選びなさい。", "answer": "火、木、金、土"}, {"category": "非言語", "problem": "月曜日から土曜日までの6日間のイベントで、A,B,C.D.E、Fの6人が1日ずつゲストとして出演することになった。だれがどの日に出演するかについて、つぎのことがわかっている。", "question": "Eが土曜日に出演する場合、Fが出演する日として考えられるのはいつか。あてはまるものをすべて選びなさい。", "answer": "月、金"}, {"category": "非言語", "problem": "月曜日から土曜日までの6日間のイベントで、A,B,C.D.E、Fの6人が1日ずつゲストとして出演することになった。だれがどの日に出演するかについて、つぎのことがわかっている。", "question": "土曜日に出演するゲストがEでもFでもない場合、火曜日に出演するゲストとして考えられるのはだれか。あてはまるものをすべて選びなさい。", "answer": "B,D,F"}, {"category": "非言語", "problem": "表は、6種類のミネラルウォーターについて、100m中に含まれる4つのミネラルの重量を示したものである。", "question": "あるボトルにミネラルウォーターTが入っている。このボトルに含まれるナトリウムの量が10.5mgだったとき、カルシウムの量は何mgか（必要なときは、最後に小数点以下第2位を四捨五入すること）。", "answer": "F(72.0mg)"}, {"category": "非言語", "problem": "表は、6種類のミネラルウォーターについて、100m中に含まれる4つのミネラルの重量を示したものである。", "question": "あるボトルにPからUまでのいずれかの種類のミネラルウォーターが入っている。このボトルに含まれるマグネシウムの量が42.0mg、カリウムの量が6.3mgだったとき、ミネラルウォーターの種類は何で、量は何mlか（必要なときは、最後に小数点以下第1位を四捨五入すること）。", "answer": "G(Uで420ml)"}, {"category": "非言語", "problem": "表は、6種類のミネラルウォーターについて、100m中に含まれる4つのミネラルの重量を示したものである。", "question": "6種類のミネラルウォーターのうち、4つのミネラルに占めるカリウムの割合が最も多いものについて、その割合は何%か（必要なときは、最後に小数点以下第1位を四捨五入すること）。", "answer": "D(4%)"}, {"category": "非言語", "problem": "表は、ある地域における酒の総消費金額の推移とその構成比である。", "question": "1995年のビール・発泡酒の消費金額は何億円か（必要な最後に千万円の位を四捨五入すること）。", "answer": "I(390億円)"}, {"category": "非言語", "problem": "表は、ある地域における酒の総消費金額の推移とその構成比である。", "question": "2005年の総消費金額は1995年に対して何ときは、最後に小数点以下第1位を四捨五入を", "answer": "B(19%)"}, {"category": "非言語", "problem": "表は、ある地域における酒の総消費金額の推移とその構成比である。", "question": "2000年の清酒の消費金額は101億円である。2000年の総消費事類は何億円か（必要な方きは、最後に千万円の位を四捨五入", "answer": "E(631億円)"}, {"category": "非言語", "problem": "表は、ある地域における酒の総消費金額の推移とその構成比である。", "question": "焼酎の消費金額は1995年から2005年にかけて何%増加した（必要なときは、後に小数点以下第1位を四捨五入すること", "answer": "I(76％)"}, {"category": "非言語", "problem": "1から9までの数字が1つずつ書かれた9枚のカードがある。この中から同時に3枚を引いたところ、数字の合計は21だった。これについて、つぎのような3通りの報告がなされた。", "question": "つぎの推論ア、イ、ウのうち、正しいものはどれか。AからHまでの中から1つ選びなさい。", "answer": "D(アとイの両方)"}, {"category": "非言語", "problem": "1から9までの数字が1つずつ書かれた9枚のカードがある。この中から同時に3枚を引いたところ、数字の合計は21だった。これについて、つぎのような3通りの報告がなされた。", "question": "つぎの推論力、キ、クのうち、正しいものはどれか。AからHまでの中から1つ選びなさい。", "answer": "D(カとキの両方)"}, {"category": "非言語", "problem": "100人を対象にピアノ、ギター、ドラムの3つの楽器の演奏経験について調査を行ったところ、つぎのことがわかった。", "question": "ピアノまたはギターのうち少なくとも一左を演奏したことがある人は何人か。", "answer": "H(74人）"}, {"category": "非言語", "problem": "100人を対象にピアノ、ギター、ドラムの3つの楽器の演奏経験について調査を行ったところ、つぎのことがわかった。", "question": "ギターまたはドラムのうち少なくとも一方を演奏したことがある人は56人いた。ギターとドラムの両方を演奏したことがある人は何人か。", "answer": "C(12人)"}, {"category": "非言語", "problem": "100人を対象にピアノ、ギター、ドラムの3つの楽器の演奏経験について調査を行ったところ、つぎのことがわかった。", "question": "ピアノとドラムの両方を演奏したことがある人は14人いた。また、ピアノだけを演奏したことがある人は22人いた。3つの楽器すべてを演奏したことがある人は何人か。", "answer": "E(4人)"}, {"category": "非言語", "problem": "結婚披露パーティの案内状を新郎側は60人に、新婦側は50人に送付した。", "question": "2週間後、新郎側は55.0%の人から、新婦側は66.0%の人から返信が来た。合計すると、案内状を送付した人のうち何%の人から返信が来たか（必要ないときは、最後に小数点以下第2位を四捨五入すること）。", "answer": "A(60.0%)"}, {"category": "非言語", "problem": "結婚披露パーティの案内状を新郎側は60人に、新婦側は50人に送付した。", "question": "最終的には新婦側は96.0%の人から、新郎側と合計すると90.0%の人から出席の返答を得た。新郎側は、案内状を送付した人のうち何%の人から出席の返答を得たか（必要なときは、最後に小数点以下第2位を四捨五入すること）。", "answer": "J(AからIのいずれでもない）？"}, {"category": "非言語", "problem": "10リットルの水が入った水槽がある。A,B，C. D,Eの5人は1人ずつ順不同でこの水槽に水を出し入れした。5人が出し入れした水の量について、つぎのことがわかっている。", "question": "4番目の人が終わった時点で、水槽の水の量として考えられるのは何リットルか。あてはまるものをすべて選びなさい。", "answer": "7、8、11、12"}, {"category": "非言語", "problem": "10リットルの水が入った水槽がある。A,B，C. D,Eの5人は1人ずつ順不同でこの水槽に水を出し入れした。5人が出し入れした水の量について、つぎのことがわかっている。", "question": "水槽に水を出し入れした順番は、Bが2番目で、CはDより後だった。このとき、3番目の人が終わった時点で、水槽の水の量として考えられるのは何リットルか。あてはまるものをすべて選びなさい。", "answer": "10、11、14"}, {"category": "非言語", "problem": "ある列車には5人がけのシートがある。このシートにP,Q,R,Sの4人が座っており、1席が空席である。このシートへの4人の座り方として、つぎのことがわかっている。\nI）QはPとSと隣り合っている\nII） RとSの間は空席である", "question": "Pの席として考えられるのはどこか。あてはまるものをすべて選びなさい。", "answer": "1,5"}, {"category": "非言語", "problem": "W,X,Y,Zの4人が将棋で1回ずつの総あたり戦を行った。いま、すべての対戦終了後の結果について、つぎのことがわかっている。ただし、引き分けはなかったものとする。\n1） Wは2勝1敗であった\nII）XはYに勝った\nII） YはZに負けた\nIV） ZはWに勝った", "question": "Ⅰ）からIV）までの情報だけで、対戦結果がすべてわかるのは、4人のうちだれか。", "answer": "D(WとYの両方)"}, {"category": "非言語", "problem": "W,X,Y,Zの4人が将棋で1回ずつの総あたり戦を行った。いま、すべての対戦終了後の結果について、つぎのことがわかっている。ただし、引き分けはなかったものとする。\n1） Wは2勝1敗であった\nII）XはYに勝った\nII） YはZに負けた\nIV） ZはWに勝った", "question": "I） からIV）までの情報のほかに、つぎのア、イ、ウのうち少なくともどの情報が加われば、4人の対戦結果がすべてわかるか。AからHまでの中から1つ選びなさい。\nアYはWに負けた\nイ３戦全敗の人がいた\nウ３戦全勝の人はいなかった", "answer": "C(ウだけ)"}, {"category": "非言語", "problem": "甲と乙の2人が同時に1個ずつのサイコロをふって、出た目の大きいほうを勝ちとする。ただし、2人の出た目が等しいときは引き分けとする。", "question": "甲が勝つ確率はいくらか。", "answer": "E(5/12)"}, {"category": "非言語", "problem": "甲と乙の2人が同時に1個ずつのサイコロをふって、出た目の大きいほうを勝ちとする。ただし、2人の出た目が等しいときは引き分けとする。", "question": "甲が4以上の目を出して乙に負ける確率はいくらか。", "answer": "B(1/12)"}, {"category": "非言語", "problem": "甲と乙の2人が同時に1個ずつのサイコロをふって、出た目の大きいほうを勝ちとする。ただし、2人の出た目が等しいときは引き分けとする。", "question": "目の差が3以上で甲が勝つ確率はいくらか。", "answer": "E(1/6)"}, {"category": "非言語", "problem": "ある品物を定価の10%引きで売って、1個あたりの利益が原価の8%になるようにしたい。", "question": "定価180円となるのは、原価がいくらの品物の場合か（必要なときは、最後に小数点以下第1位を四捨五入すること）。", "answer": "D(150円)"}, {"category": "非言語", "problem": "ある品物を定価の10%引きで売って、1個あたりの利益が原価の8%になるようにしたい。", "question": "定価1260円となるのは原価がいくらの品物の場合か（必要な時は、小数点以下第1位を四捨五入すること）。", "answer": "C(1050円)"}, {"category": "非言語", "problem": "春枝と夏夫の年齢を加えると秋子の年齢になる。夏夫は冬彦よりも年上である。", "question": "つぎの推論ア、イ、ウのうち、必ず正しいといえるものはどれか。AからHまでの中から1つ選びなさい。\nア 秋子は冬彦よりも年上である\nイ春枝は冬彦よりも年上である\nウ夏夫は秋子よりも年上である", "answer": "A(アだけ)"}, {"category": "非言語", "problem": "春枝と夏夫の年齢を加えると秋子の年齢になる。夏夫は冬彦よりも年上である。", "question": "つぎの推論力、カ、キ、クのうち、必ず正しいと言えるものはどれか。AからHまでの中から選びなさい。\nカ 秋子はいちばん年上である\nキ春枝は秋子よりも年上である\nク夏夫は春枝よりも年上である", "answer": "A(カだけ)"}, {"category": "非言語", "problem": "あるツアーでは、3日目と4日目にそれぞれP,Q,Rのいずれかのテーマパークに入園できる（入園しなくてもよい）。表は、このツアーの参加者150人が、どのテーマパークに入園したかをまとめたものである。たとえば、表中の網掛け部分は3日目にテーマパークPに行き、4日目はテーマパークに入園しなかった人が4人いたことを表している。", "question": "3日目と4日目で2つの異なるテーマパークに入園した人は何人か。", "answer": "F(84人)"}, {"category": "非言語", "problem": "あるツアーでは、3日目と4日目にそれぞれP,Q,Rのいずれかのテーマパークに入園できる（入園しなくてもよい）。表は、このツアーの参加者150人が、どのテーマパークに入園したかをまとめたものである。たとえば、表中の網掛け部分は3日目にテーマパークPに行き、4日目はテーマパークに入園しなかった人が4人いたことを表している。", "question": "どちらか1日しかテーマパークに入園しなかった人は、参加者全体の何%か（必要なときは、最後に小数点以下第1位を四捨五入すること）。", "answer": "F(18%)"}, {"category": "非言語", "problem": "あるツアーでは、3日目と4日目にそれぞれP,Q,Rのいずれかのテーマパークに入園できる（入園しなくてもよい）。表は、このツアーの参加者150人が、どのテーマパークに入園したかをまとめたものである。たとえば、表中の網掛け部分は3日目にテーマパークPに行き、4日目はテーマパークに入園しなかった人が4人いたことを表している。", "question": "テーマパークPに入園した人のうち、2日ともテーマパークPに入園した人は何%か（必要なときは、最後に小数点以下第1位を四捨五入すること）。", "answer": "C(16%)"}, {"category": "非言語", "problem": "あるツアーでは、3日目と4日目にそれぞれP,Q,Rのいずれかのテーマパークに入園できる（入園しなくてもよい）。表は、このツアーの参加者150人が、どのテーマパークに入園したかをまとめたものである。たとえば、表中の網掛け部分は3日目にテーマパークPに行き、4日目はテーマパークに入園しなかった人が4人いたことを表している。", "question": "3日目にテーマパークRに入園した人数は、4日目にテーマパークRに入園した人数の1.5倍だった。表中の空欄（ア）は何人か。", "answer": "H(14人)"}, {"category": "非言語", "problem": "P,Q,R,Sの4人が駅で午前10時に待ち合わせをした。このときの状況についてつぎのことがわかっている。\nⅠ） 同時に着いた人はいなかった\nII） 待ち合わせ時刻に遅れて来た人が2人いた\nIII） Pはちょうど午前10時に来た\nIV） Qが来たときSはまだ来ていなかった", "question": "つぎの推論ア、イについて、必ず正しいか、必ず誤りか、あるいはどちらともいえないかを考え、Aから1までの中から正しいものを1つ選びなさい。\nアQは1番目に来た\nイPは2番目に来た", "answer": "D(アはどちらともいえないが、イは正しい)"}, {"category": "非言語", "problem": "P,Q,R,Sの4人が駅で午前10時に待ち合わせをした。このときの状況についてつぎのことがわかっている。\nⅠ） 同時に着いた人はいなかった\nII） 待ち合わせ時刻に遅れて来た人が2人いた\nIII） Pはちょうど午前10時に来た\nIV） Qが来たときSはまだ来ていなかった", "question": "最も少ない情報で4人が来た順番がすべてわかるためにはⅠ）からⅣ）までの情報のほかに、つぎの力、\nキ、クのうちどれが加わればよいか。AからHまでの中から正しいものを1つ選びなさい。\nカPが来たときRはまだ来ていなかった\nキQかれたとさんはまた水ていなかった\nクSが来たときRはまだ来ていなかった", "answer": "C(クだけ)"}, {"category": "非言語", "problem": "V,W,X,Y,Zの5人が縦1列に並ぶ。", "question": "前から3番目にVが並び、Wのすぐ後ろにはXが並ばない場合、並び方は何通りあるか。", "answer": "G(20通り)"}, {"category": "非言語", "problem": "V,W,X,Y,Zの5人が縦1列に並ぶ。", "question": "Yより前にXが並び、かつYより後ろにZが並ぶ場合、並び方は何通りあるか。", "answer": "G(20通り)"}, {"category": "非言語", "problem": "ある店では、定価で売ると仕入れ値の2割の利益が上がるような価格設定をしている。", "question": "この店で商品Pの1個あたりの利益は240円である。商品Pの定価はいくらか。", "answer": "D(1200円)"}, {"category": "非言語", "problem": "ある店では、定価で売ると仕入れ値の2割の利益が上がるような価格設定をしている。", "question": "ある日、この店が商品Qを1個500円で80個仕入れた。夕方までに定価で50個を売ったが、売れ残りそうだったので定価の1\n割引きにしたところ、閉店までにすべて売れた。この日の商品\nQによる利益の総額はいくらか。", "answer": "G(6200円)"}, {"category": "非言語", "problem": "赤のボールペンが4本、黒と青のボールペンが3本ずつあり、P,Q, R, S, Tの5人で2本ずつ分けた。この5人がもらったボールペンの色について、つぎのことがわかっている。\nⅠ）PとQがもらったボールペンの色の組み合わせは同じだった\nII） Rは赤のボールペンをもらわなかった", "question": "仮に、Sは赤のボールペンを2本もらったとする。このとき、Tがもらったボールペンの色の組み合わせとして考えられるものはどれか。あてはまるものをすべて選びなさい。", "answer": "1.2.3.6(赤2本、黒2本、青2本、黒と青1本)"}, {"category": "非言語", "problem": "赤のボールペンが4本、黒と青のボールペンが3本ずつあり、P,Q, R, S, Tの5人で2本ずつ分けた。この5人がもらったボールペンの色について、つぎのことがわかっている。\nⅠ）PとQがもらったボールペンの色の組み合わせは同じだった\nII） Rは赤のボールペンをもらわなかった", "question": "仮に、2本とも同じ色のボールペンをもらった人は4人だったとする。このとき、Tがもらったボールペンの色の組み合わせとして考えられるものはどれか。あてはまるものをすべて選びなさい。", "answer": "2.3.6(黒2本、青2本、黒と青1本)"}, {"category": "非言語", "problem": "ある通りにP,Q,R,S,T,Uの6つの店が並んでいる。\nこれらの店の並び方について、つぎのことがわかっている。\nⅠ） P店の右隣はQ店である\nII） R店の右隣はS店である", "question": "仮にT店の両隣がP店とU店だとすると、U店の位置として考えられるのはどこか。あてはまるものをすべて選びなさい。", "answer": "左から1,3番目"}, {"category": "非言語", "problem": "ある通りにP,Q,R,S,T,Uの6つの店が並んでいる。\nこれらの店の並び方について、つぎのことがわかっている。\nⅠ） P店の右隣はQ店である\nII） R店の右隣はS店である", "question": "仮にT店とU店の間には2つの店があるとすると、S店の位置として考えられるのはどこか。あてはまるものをすべて選びなさい。", "answer": "左から2,3,5,6番目"}, {"category": "非言語", "problem": "P,Q, R, S,Tの5人は、ある地域で行われた運動会の綱引き、玉入れ、大縄跳びのうち少なくとも1種目に参加した。5人が参加した種目について、つぎのことがわかっている。\nⅠ） 綱引きには3人、玉入れには4人、大縄跳びには2人が参加した\nII） 2種目に参加したのは2人だった\nIII） Qが参加したのは大縄跳びだけだった\nIV）Rは綱引きには参加しなかった", "question": "Ⅰ）からⅣ）までの情報から判断して、つぎの推論ア、イ、ウのうち、必ずしも誤りとはいえないものはどれか。AからHまでの中から1つ選びなさい。\nア Pは2種目に参加した\nイRは2種目に参加した\nウ Tは2種目に参加した", "answer": "E(アとウの両方)"}, {"category": "非言語", "problem": "P,Q, R, S,Tの5人は、ある地域で行われた運動会の綱引き、玉入れ、大縄跳びのうち少なくとも1種目に参加した。5人が参加した種目について、つぎのことがわかっている。\nⅠ） 綱引きには3人、玉入れには4人、大縄跳びには2人が参加した\nII） 2種目に参加したのは2人だった\nIII） Qが参加したのは大縄跳びだけだった\nIV）Rは綱引きには参加しなかった", "question": "最も少ない情報で5人の参加した種目がすべてわかるためには、Ⅰ)からⅣ)までの情報の他にどれが加わればよいか。AからHまでの中から1つ選びなさい。\n力 Pは大縄跳びには参加しなかった\nキSはPよりも多くの種目に参加した\nクTはRよりも1種目多く参加した", "answer": "B(キだけ)"}, {"category": "非言語", "problem": "あるマンションに居住する120世帯を対象に、懸案事項についての賛否を問うアンケートを実施した。表はその結果の一部を示した\nものである。", "question": "積立金値上げに賛成したが管理費値上げに賛成しなかったのは45世帯だった。\n管理費値上げに賛成したが積立金値上げに賛成しなかったのは何世帯か。", "answer": "E(29世帯)"}, {"category": "非言語", "problem": "あるマンションに居住する120世帯を対象に、懸案事項についての賛否を問うアンケートを実施した。表はその結果の一部を示した\nものである。", "question": "管理費値上げと駐車場代値上げの両方に賛成したのは26世帯だった。管理費値上げにも駐車場代値上げにも賛成しなかったのは何世帯か。", "answer": "C(27世帯)"}, {"category": "非言語", "problem": "あるマンションに居住する120世帯を対象に、懸案事項についての賛否を問うアンケートを実施した。表はその結果の一部を示した\nものである。", "question": "管理費値上げと駐輪代値上げの両方に賛成したのは26世帯だった。積立金値上げと駐車場代値上げの両方に賛成したのは43世帯で、\nそのうち8世帯は管理費値上げにも賛成していた。駐車場代値上げだけに賛成したのは何世帯か。", "answer": "E(11世帯)"}, {"category": "非言語", "problem": "高校のスピーチ大会に、1年生からはP,Q,R,Sが出場することになった。学年に関係なく、くじを引いてスピーチの順番を決めたところ、つぎのようになった。\nⅠ） Pの3人あとはQである\nII） Rの4人あとはSである\nII） 全出場者の中でPが最初に、Sが最後にスピーチをする", "question": "この大会の出場者は全部で何人だと考えられるか。当てはまるもの全て選びなさい。", "answer": "6,7,9,10>人"}, {"category": "非言語", "problem": "男性P,Q,Rと女性S,T,Uの合わせて6人が、写真撮影のために横1列に並んだ。6人の並び方について、つぎのことがわかっている。\nI）同性の人が3人続いて並ぶことはなかった\nII）PはQの隣に並んだ\nIII）RはSの隣に並んだ\nIV）SはTより左に並んだ", "question": "仮にPが右端に並んだとすると、Uが並んだ場所として考えられるのはどこか。\nあてはまるものを全て選びなさい。", "answer": "左から1,3,4番目"}, {"category": "非言語", "problem": "男性P,Q,Rと女性S,T,Uの合わせて6人が、写真撮影のために横1列に並んだ。6人の並び方について、つぎのことがわかっている。\nI）同性の人が3人続いて並ぶことはなかった\nII）PはQの隣に並んだ\nIII）RはSの隣に並んだ\nIV）SはTより左に並んだ", "question": "仮にRが左端にならんだとすると、Uが並んだ場所として考えられるのはどこか。当てはまるもの全て選びなさい。", "answer": "左から3,4,5,6番目"}, {"category": "非言語", "problem": "ある5地域で、穀類と果実のそれぞれについて、生産量の多い順に順位をつけた。ただし、生産量が等しい地域はなかった。この順位について、つぎのことがわかっている。\nI）穀類。果実とも4位の地域がある\nII）教類が5位、果実が2位の地域がある\nIII）類の順位より果実の順位が低い地域は2つある", "question": "穀類が3位である地域の果実の順位として、考えられるものをすべてあげているのはどれか。", "answer": "E(1位か5位)"}, {"category": "非言語", "problem": "ある5地域で、穀類と果実のそれぞれについて、生産量の多い順に順位をつけた。ただし、生産量が等しい地域はなかった。この順位について、つぎのことがわかっている。\nI）穀類。果実とも4位の地域がある\nII）教類が5位、果実が2位の地域がある\nIII）類の順位より果実の順位が低い地域は2つある", "question": "最も少ない情報で5地域の穀類と果物それぞれの生産地の多い順がすべてわかるためには、I）からIII）までの情報の他につぎのア、イ、ウのうちどれが加わればよいか。AからHまでの中から正しいものを1つ選びなさい。\nア穀類が1位の地域は果実が3位である\nイ穀類が2位の地域は乗実が1位である\nウ穀類が3位の地域は果実が5位である", "answer": "B(イだけ)"}, {"category": "非言語", "problem": "商品P,Qに対し、仕入れ値に4割の利益をのせて定価を定めた", "question": "仕入れ値700円の商品Pを定価の1割引きで売った場合に比べ、2割引きの場合には、商品Pの1個あたりの利益はいくら少なくなるか。", "answer": "E(98円)"}, {"category": "非言語", "problem": "商品P,Qに対し、仕入れ値に4割の利益をのせて定価を定めた", "question": "商品Qを定価の1割引で売ると312円の利益がある。定価の2割引きでで売って1000円以上の利益を上げるには商品Qを少なくとも何個売ればいいか。", "answer": "I(70個)"}, {"category": "非言語", "problem": "表1は、3つの地区におけるある番組の世帯視聴率を、3週にわたり調べたものである。また、各地区の総世帯数は表2のとおりである。つぎの式から、この番組を視聴していた世帯数が推定される。\n視聴世帯数＝世帯視聴率x総世帯数÷100", "question": "第3地区における第2週の視聴率は何%か（必要なときは、最後に小数点以下第2位を四捨五入すること）。", "answer": "C(9.6%)"}, {"category": "非言語", "problem": "表1は、3つの地区におけるある番組の世帯視聴率を、3週にわたり調べたものである。また、各地区の総世帯数は表2のとおりである。つぎの式から、この番組を視聴していた世帯数が推定される。\n視聴世帯数＝世帯視聴率x総世帯数÷100", "question": "第1週と第3週の視聴率を比較すると、伸び率が最も高いのは、どの地区で何倍になったか（必要なときは、最後に小数点以下第3位を四捨五入すること）。", "answer": "B(第一地区、1.79倍)"}, {"category": "非言語", "problem": "表1は、3つの地区におけるある番組の世帯視聴率を、3週にわたり調べたものである。また、各地区の総世帯数は表2のとおりである。つぎの式から、この番組を視聴していた世帯数が推定される。\n視聴世帯数＝世帯視聴率x総世帯数÷100", "question": "第2地区における第2週と第3週の視聴世帯数の平均は、123万世帯であった。第2地区の総世帯数は何万世帯か（必要なときは、最後に千の位を四捨五入すること）。", "answer": "D(678万世帯)"}, {"category": "非言語", "problem": "表1は、3つの地区におけるある番組の世帯視聴率を、3週にわたり調べたものである。また、各地区の総世帯数は表2のとおりである。つぎの式から、この番組を視聴していた世帯数が推定される。\n視聴世帯数＝世帯視聴率x総世帯数÷100", "question": "第1週の視聴世帯数について、第1地区は第3地区の何倍か（必要なときは、最後に小数点以下第3位を四捨五入すること）。", "answer": "H(3.55倍)"}, {"category": "非言語", "problem": "P,Qの2人がゲームをした。それぞれが（1）（2）（3）（4）（5）の5枚のカードを持ち、同時に1枚ずつ出して数字の大きいほうを勝ちとし、同じ数字なら引き分けとする対戦を、カードがなくなるまで5回行った。2人の対戦について、つぎのことがわかっている。\n1） Pは4勝1敗だった\nII） Pは1回目に（5）を出した\nII） Qは4回目に（1）を出した\nI） 3回目の対戦はQが勝った", "question": "Ⅰ)からIV）までの情報から判断して、つぎの推論ア、イについて、必ず正しいか、必ず誤りか、あるいはどちらともいえないかを考え、AからIまでの中から正しいものを1つ選びなさい。\nアPは3回目に（3）を出した\nイQは3回目に（5）を出した", "answer": "G(アは誤りだが、イは正しい）"}, {"category": "非言語", "problem": "P,Qの2人がゲームをした。それぞれが（1）（2）（3）（4）（5）の5枚のカードを持ち、同時に1枚ずつ出して数字の大きいほうを勝ちとし、同じ数字なら引き分けとする対戦を、カードがなくなるまで5回行った。2人の対戦について、つぎのことがわかっている。\n1） Pは4勝1敗だった\nII） Pは1回目に（5）を出した\nII） Qは4回目に（1）を出した\nI） 3回目の対戦はQが勝った", "question": "Ⅰ）からⅣ）までの情報から判断して、つぎの推論力、キについて、必ず正しいか、必ず誤りか、あるいはどちらともいえないかを考え、Aから1までの中から正しいものを1つ選びなさい。カ Pは4回目に（2）を出したキ Qは5回目に（2）を出した", "answer": "B(カは正しいが、キはどちらともいえない)"}, {"category": "非言語", "problem": "ある小学校の6年生56人に、塾・通信添削・家庭教師を利用しているかどうかアンケートをとったところ、つぎのとおりであった。塾を利用している33人通信添削を利用している14人家庭教師を利用している12人", "question": "塾は利用しているが通言添削は利用していない児童は28人だった。通添削は利用しているが塾は利用していない児童は何人\nか。", "answer": "G(9人)"}, {"category": "非言語", "problem": "ある小学校の6年生56人に、塾・通信添削・家庭教師を利用しているかどうかアンケートをとったところ、つぎのとおりであった。塾を利用している33人通信添削を利用している14人家庭教師を利用している12人", "question": "通信添削も家庭教師も利用している児童は7人だった。通信添削も家庭教師も利用していない児童は何人か。", "answer": "G(37人)"}, {"category": "非言語", "problem": "ある小学校の6年生56人に、塾・通信添削・家庭教師を利用しているかどうかアンケートをとったところ、つぎのとおりであった。塾を利用している33人通信添削を利用している14人家庭教師を利用している12人", "question": "通信添削も家庭教師も利用している児童は7人だった。また、塾も家庭教師も利用している児童は6人で、そのうち3人は通信添削も利用していた。家庭教師のみを利用してる児童は何人か。", "answer": "B(2人)"}, {"category": "非言語", "problem": "P, Q, R, S, Tの5人が1つずつプレゼントを用意し、抽選で交換をした。5人がもらったプレゼントについて、つぎのことがわかっている。\nⅠ） 自分の用意したプレゼントをもらった人はいなかった\nII） PがもらったのはQ,Rの用意したプレゼントではなかった\nⅢ）SがもらったのはP,Rの用意したプレゼントではなかった", "question": "仮にRはQの用意したプレゼントをもらったとすると、Tは誰の用意したプレゼントをもらったと考えられるか。当てはまるもの全てを選びなさい。", "answer": "1,3(P,R)"}, {"category": "非言語", "problem": "P, Q, R, S, Tの5人が1つずつプレゼントを用意し、抽選で交換をした。5人がもらったプレゼントについて、つぎのことがわかっている。\nⅠ） 自分の用意したプレゼントをもらった人はいなかった\nII） PがもらったのはQ,Rの用意したプレゼントではなかった\nⅢ）SがもらったのはP,Rの用意したプレゼントではなかった", "question": "仮にRがもらったのはP，\nQの用意したプレゼントではなかっ\nたとすると、だれの用意したプレゼントをもらったか確実にわかるのはだれか。あてはまるものをすべて選びなさい。", "answer": "4(S)"}, {"category": "非言語", "problem": "過去の統計によれば、Pの誕生日に雨が降る確率は30%、Qの誕生日に雨が降る確率は40%である。いま、この数値に基づいて今年の誕生日の天気を考える。", "question": "P,Qどちらの誕生日にも雨が降らない確率は何%か。", "answer": "E(42%)"}, {"category": "非言語", "problem": "過去の統計によれば、Pの誕生日に雨が降る確率は30%、Qの誕生日に雨が降る確率は40%である。いま、この数値に基づいて今年の誕生日の天気を考える。", "question": "PかQのどちらか一方の誕生日にだけ雨が降る確率は何%か。", "answer": "D(46%)"}, {"category": "非言語", "problem": "P,Q, R,S,Tは夏休みにそれぞれ別の地域に旅行した。5人のうち男性は3人、女性は2人で、行先は北海道、沖縄、アメリカ、イギリス、フランスだった。5人の性別と行先について、つぎのことがわかっている。\nⅠ） 男性のうち2人が海外旅行だった\nII） ヨーロッパには男性と女性のそれぞれ1人が行った\nIII） QとSは国内旅行だった\nIV） Rはアメリカに行った", "question": "Ⅰ）からIV）までの情報から判断して、つぎの推論ア、イについて、必ず正しいか、必ず誤りか、あるいはどちらともいえないかを考え、Aから1までの中から正しいものを1つ選びなさい。\nアQは女性である\nイRは男性でおる", "answer": "D(アはどちらともいえない、イは正しい)"}, {"category": "非言語", "problem": "P,Q, R,S,Tは夏休みにそれぞれ別の地域に旅行した。5人のうち男性は3人、女性は2人で、行先は北海道、沖縄、アメリカ、イギリス、フランスだった。5人の性別と行先について、つぎのことがわかっている。\nⅠ） 男性のうち2人が海外旅行だった\nII） ヨーロッパには男性と女性のそれぞれ1人が行った\nIII） QとSは国内旅行だった\nIV） Rはアメリカに行った", "question": "1） からIV）までの情報のほかに、\nPはSと同性で、北海道には女性が行ったことがわかった。\nこのとき、つぎの推論力、キについて、必ず正しいか。\n必ず誤りか、あるいはどちらとも\nいえないかを考え、Aから1までの中から正しいものを1つ選びなさい。\nカPがRと同性なら、Sは沖縄に行った\nキQが沖縄に行ったなら、Tは女性である", "answer": "C(カは正しいが、キは誤り)"}, {"category": "非言語", "problem": "ある店では商品P、Qをそれぞれ80個仕入れた。", "question": "商品Pの定価を120円として売ったところ、80個すべて売り切れ、総額で1600円の利益を得た。商品Pの1個あたりの仕入れ値はいくらか。", "answer": "I(100円)"}, {"category": "非言語", "problem": "ある店では商品P、Qをそれぞれ80個仕入れた。", "question": "商品Qを1個あたり300円で仕入れ、定価を420円にして売ることにした。\n定価では56個売れ、残りは仕入れ値の8割の価格にしてすべて売った。このとき、商品Qの利益は総額でいくらか。", "answer": "E(5280円)"}, {"category": "非言語", "problem": "X,Y,Zの3人は、月曜日から日曜日までの7日間開かれる展示会で受付をすることになり、毎日3人のうち1人が受付の責任者になった。何曜日にだれが責任者になったかについて、つぎのことがわかっている。\nⅠ） 2日続けて責任者になった人はいない\nII） ✕は月曜日とそのほかに2日責任者になった\nⅢ） Yは2日責任者になった\nⅣ）水曜日はZが責任者になった", "question": "Zが金曜日も責任者になったとすると、月曜日以外でXが責任者になったと確実にわかる曜日はいつか。あてはまるものをすべて選びなさい。", "answer": "3,5(木曜日、土曜日)"}, {"category": "非言語", "problem": "X,Y,Zの3人は、月曜日から日曜日までの7日間開かれる展示会で受付をすることになり、毎日3人のうち1人が受付の責任者になった。何曜日にだれが責任者になったかについて、つぎのことがわかっている。\nⅠ） 2日続けて責任者になった人はいない\nII） ✕は月曜日とそのほかに2日責任者になった\nⅢ） Yは2日責任者になった\nⅣ）水曜日はZが責任者になった", "question": "Yが中2日おいて責任者になったとすると、水曜日以外でZが責任者になったと考えられる曜日はいつか。あてはまるものをすべて選びなさい", "answer": "6(日曜日)?"}, {"category": "非言語", "problem": "ダンスの練習でA,B,C,D,E,F,Gの7人が等間隔で横一列に並んだ。7人の並び方について、次のことがわかっている。\nⅠ） AとBは6m離れている\nII） CとDは12m離れている", "question": "EとFは4m離れているとすると、Gの位置として考えられるのはどこか。あてはまるものをすべて選びなさい。", "answer": "3,5(左から)"}, {"category": "非言語", "problem": "ダンスの練習でA,B,C,D,E,F,Gの7人が等間隔で横一列に並んだ。7人の並び方について、次のことがわかっている。\nⅠ） AとBは6m離れている\nII） CとDは12m離れている", "question": "EとFは30m離れているとすると、Gの位置として考えられるのはどこか。あてはまるものをすべて選びなさい。", "answer": "2,4,6(左から)"}, {"category": "非言語", "problem": "P,Q,R,Sの4 人の先週の読書時間について、つぎのことがわ 録はTより2cm長かった", "answer": "F(キとクの両方)"}, {"category": "非言語", "problem": "大学生の男女各100人を対象に、生活習慣についての調査を行った。表は、調査項目と集計結果の一部である。\n女性で、深夜1時以前に就寝せず、朝食を食べない人が25人いた。\n男性で、深夜1時以前に就寝するが、朝食を食べない人が15人いた。", "question": "深夜1時以前に就寝し、朝食を食べる女性は何人か", "answer": "D(30人)"}, {"category": "非言語", "problem": "大学生の男女各100人を対象に、生活習慣についての調査を行った。表は、調査項目と集計結果の一部である。\n女性で、深夜1時以前に就寝せず、朝食を食べない人が25人いた。\n男性で、深夜1時以前に就寝するが、朝食を食べない人が15人いた。", "question": "深夜1時以前には就寝しないが、朝食を食べる男性は何人か。", "answer": "E(30人)"}, {"category": "非言語", "problem": "大学生の男女各100人を対象に、生活習慣についての調査を行った。表は、調査項目と集計結果の一部である。\n女性で、深夜1時以前に就寝せず、朝食を食べない人が25人いた。\n男性で、深夜1時以前に就寝するが、朝食を食べない人が15人いた。", "question": "深夜1時以前に就寝するか，朝食を食べるかの少なくとも一方の生活習慣をもつ人は、男女合わせて何人か。", "answer": "H(136人)"}, {"category": "非言語", "problem": "ある研修所での1人あたり1泊の料金は、つぎのとおりである。1人部屋：8000円/人\n2人部屋：7500円/人\n4人部屋：7000円/人\n6人部屋：6500円/人\nただし、部屋の収容人数に満たない人数や、それを超えた人数での宿泊はできない。", "question": "この研究所に7人のグループで一泊し、料金が最も安くなるように部屋を組み合わせる時、合計でいくら支払うことになるか。", "answer": "F(47000円)"}, {"category": "非言語", "problem": "ある研修所での1人あたり1泊の料金は、つぎのとおりである。1人部屋：8000円/人\n2人部屋：7500円/人\n4人部屋：7000円/人\n6人部屋：6500円/人\nただし、部屋の収容人数に満たない人数や、それを超えた人数での宿泊はできない。", "question": "この研修所に8人のグループで2泊し、\n料金が最も安くなるよ\nうに部屋を組み合わせて合計料金を等分するとき、1人あたりいくら支払うことになるか。", "answer": "F(13500円)"}, {"category": "非言語", "problem": "ある人が車を購入し、頭金として総額の1/15を支払った。", "question": "2回目の支払い時に残金の2/5を支払い，残りは7回に均等にわけて支払うことにする。このとき、残り7回の1回のあたりの支払い金額は総額のどれだけか。ただし、利子はかからないものとする。", "answer": "C(2/25)"}, {"category": "非言語", "problem": "ある人が車を購入し、頭金として総額の1/15を支払った。", "question": "頭金を払った後、残金を20回に均等にわけて支払うことにすると、\n1回あたりの支払い金額は頭金のどれだけか。ただし、利子はかからないものとする。", "answer": "H(7/10)"}, {"category": "非言語", "problem": "Xは、目的地Pまで3日間かけてサイクリングをすることにした。\n1日目には全行程の1/3を走った。", "question": "2日目に全行程の2/7を走るとすると、3日目に走る距離は全行程のどれだけにあたるか。", "answer": "D(8/21)"}, {"category": "非言語", "problem": "Xは、目的地Pまで3日間かけてサイクリングをすることにした。\n1日目には全行程の1/3を走った。", "question": "3日目に、2日目に走った距離の2/3だけ走って目的地Pに到着するようにしたい。2日目には全行程のどれだけを走ればよいか。", "answer": "D(2/5)"}, {"category": "非言語", "problem": "4つの電球P,Q,R,Sの明るさの順番について、つぎのことがわかっている。Ⅰ） 4つの電球の明るさはすべて異なっている\nII） Pのつぎに明るいのはQである\nIII）最も明るいのはRではない", "question": "Ⅰ）からⅢ）までの情報から判断して、つぎの推論ア、イ、ウのうち、必ずしも誤りとはいえないものはどれか。AからH\nまでの中から1つ選びなさい。\nア2番目に明るいのはSである\nイ3番目に明るいのはRである\nウ 4番目に明るいのはQである", "answer": "F(イとウの両方)"}, {"category": "非言語", "problem": "4つの電球P,Q,R,Sの明るさの順番について、つぎのことがわかっている。Ⅰ） 4つの電球の明るさはすべて異なっている\nII） Pのつぎに明るいのはQである\nIII）最も明るいのはRではない", "question": "Ⅰ）からⅢ）までの情報のほかに、つぎの力、キ、クのうちどれが加われば、明るさの順番がただ1通りに決まるか。AからGまでの中から1つ選びなさい。力 Qのつぎに明るいのはRであるキ Sのつぎに明るいのはPであるク最も暗いのはRである", "answer": "B(キだけで決まる)"}, {"category": "非言語", "problem": "表は、ある住宅地の4つの地区P,Q,R,Sについて、中学生以下の子どもの人数を未就学児、小学生、中学生に分けて示したものである。", "question": "P地区の総人口のうち小学生と中学生の占める割合は何%か\n（必要なときは、最後に小数点以下第1位を四捨五入すること", "answer": "F(15%)"}, {"category": "非言語", "problem": "表は、ある住宅地の4つの地区P,Q,R,Sについて、中学生以下の子どもの人数を未就学児、小学生、中学生に分けて示したものである。", "question": "Q地区の未就学児の人数がP地区の1.2倍であるとき、Q地区の未就学児は何人か。", "answer": "D(246人)"}, {"category": "非言語", "problem": "表は、ある住宅地の4つの地区P,Q,R,Sについて、中学生以下の子どもの人数を未就学児、小学生、中学生に分けて示したものである。", "question": "R地区の総人口のうち中学生の割合は6.0%、小学生の割合は10.0%である。R地区の小学生は何人か。", "answer": "E(195人)"}, {"category": "非言語", "problem": "ある調査機関が、5つのホテルV,W,X,Y,Zの顧客満足度の調査を行い，その結果を得点に換算した。5つのホテルそれぞれの得点について、以下のことがわかっている。Ⅰ）5つのホテルには同点のものはない\nII）Wの得点はVよりも高い\nII）Xの得点はYよりも高い\nI） Zの得点はWとVの得点の平均に等しい", "question": "確実にわかることは、つぎのア、イ、ウのうちどれか。", "answer": "B(イだけ)"}, {"category": "非言語", "problem": "ある調査機関が、5つのホテルV,W,X,Y,Zの顧客満足度の調査を行い，その結果を得点に換算した。5つのホテルそれぞれの得点について、以下のことがわかっている。Ⅰ）5つのホテルには同点のものはない\nII）Wの得点はVよりも高い\nII）Xの得点はYよりも高い\nI） Zの得点はWとVの得点の平均に等しい", "question": "Ⅰ）からIV）までの情報のほかに、つぎのことがわかった。V） Zの得点はYよりも高い　Ⅰ）からV）までの情報から判断して、得点の高い順に5つのホテルを並べたとき、Zの順位として考えられるものをすべてあげているのはどれか", "answer": "F(2位か3位)"}, {"category": "非言語", "problem": "ある調査機関が、5つのホテルV,W,X,Y,Zの顧客満足度の調査を行い，その結果を得点に換算した。5つのホテルそれぞれの得点について、以下のことがわかっている。Ⅰ）5つのホテルには同点のものはない\nII）Wの得点はVよりも高い\nII）Xの得点はYよりも高い\nI） Zの得点はWとVの得点の平均に等しい", "question": "もっとも少ない情報で５つのホテルの得点がすべてわかるためには①～⑤までの情報の他に、\n 次のどれが加われば良いか\n \n カ。Ｖの得点はＸより高い\n キ。Ｗの得点はＸよりたかい\n ク。Ｚの得点はＸよりも高い", "answer": "カ(Vの得点はXより高い)"}, {"category": "非言語", "problem": "300人に対して旅行に関するアンケートを行った。調査項目と集計結果の一部は、つぎのとおりである。", "question": "P地、Q地の両方に行ったことのある人は50人いた。P地，Q地のいずれへも行ったことのない人は、何人いることになる\nか。", "answer": "F(100人)"}, {"category": "非言語", "problem": "300人に対して旅行に関するアンケートを行った。調査項目と集計結果の一部は、つぎのとおりである。", "question": "P地へ行ったことのない人の1/3がR地へ行ったことがあった。P地，R地の両方に行ったことのある人は、何人いることになるか。", "answer": "C(50人)"}, {"category": "非言語", "problem": "ある印刷会社の印刷代の算定基準は、つぎのようになっている。Ⅰ） 1～100枚1枚8円 II)101～500枚　100枚を超えた数につき1枚5円　III） 501枚以上　500枚を超えた枚数につき1枚3円", "question": "250枚の印刷代はいくらか（必要なときは、最後に一の位を四捨五入すること）。", "answer": "F(1550円)"}, {"category": "非言語", "problem": "ある印刷会社の印刷代の算定基準は、つぎのようになっている。Ⅰ） 1～100枚1枚8円 II)101～500枚　100枚を超えた数につき1枚5円　III） 501枚以上　500枚を超えた枚数につき1枚3円", "question": "750枚の印刷代はいくらか（必要なときは、最後に一の位を四捨五入すること）。", "answer": "C(3550円)"}, {"category": "非言語", "problem": "1から8までの数字が1つずつ書かれたカードがあり、そのうちXは奇数のカードを4枚、Yは偶数のカードを4枚持っている。これから2人はカードを交換する。", "question": "仮に、XとYがカードを1枚ずつ交換した結果，Xのカードの数字の和が23になったとする。このとき、交換後にYが持っているカードの数字として考えられるものはどれか。あてはまるものをすべて選びなさい。", "answer": "1,2,4,6"}, {"category": "非言語", "problem": "1から8までの数字が1つずつ書かれたカードがあり、そのうちXは奇数のカードを4枚、Yは偶数のカードを4枚持っている。これから2人はカードを交換する。", "question": "仮に、XとYがカードを2枚ずつ交換した結果、Xのカードの数字の和が12になったとする。このとき、交換後にYが必ず持っているカードの数字として考えられるものはどれか。あてはまるものをすべて選びなさい。", "answer": "7,8"}, {"category": "非言語", "problem": "表は、P社のオリジナルうちわ製作料金表の一部である。ただし、発注から納品までの期間が通常より長い「納期ゆとりパック」は合計料金が20%引きになる。", "question": "あるお祭りで、うちわの製作をP社に依頼することにした。\n2種類のデザインで200本ずつ作る場合、同一デザインで400本作る場合に比べて、合計料金はいくら高くなるか。", "answer": "D(28800円)"}, {"category": "非言語", "problem": "表は、P社のオリジナルうちわ製作料金表の一部である。ただし、発注から納品までの期間が通常より長い「納期ゆとりパック」は合計料金が20%引きになる。", "question": "あるイベントで、「納期ゆとりパック」でP社から500本のうちわの納品を受けた後で、あらたに通常料金で100本追加することになった。料金は合計でいくらになるか。", "answer": "F(70000円)"}, {"category": "非言語", "problem": "XとYがジャンケンを1回した。このジャンケンについて、つぎのような3通りの報告があ った。\nP:XはYに勝った\nQ:X は グー 、 Y は チ ョ キ を 出 し た\nR:XもYもパーを出さなかった\n以上の報告は、必ずしもすべてが信頼できるとはいえない。そこで、種々の場合を想定して推論がなされた。", "question": "つぎの推論ア、イ、ウのうち、正しいものはどれか。Aから\nHまでの中から1つ選びなさい。アPが正しければQも必ず正しいイQが正しければRも必ず正しい\nウ Rが正しければPも必ず正しい", "answer": "B(イだけ)"}, {"category": "非言語", "problem": "XとYがジャンケンを1回した。このジャンケンについて、つぎのような3通りの報告があ った。\nP:XはYに勝った\nQ:X は グー 、 Y は チ ョ キ を 出 し た\nR:XもYもパーを出さなかった\n以上の報告は、必ずしもすべてが信頼できるとはいえない。そこで、種々の場合を想定して推論がなされた。", "question": "つぎの推論力、キ、クのうち、正しいものはどれか。AからHまでの中から1つ選びなさい。力 Pが正しければRも必ず正しいキ Qが正しければPも必ず正しいクRが正しければQも必ず正しい", "answer": "B(キだけ)"}, {"category": "非言語", "problem": "パソコンを分割払いで購入することにした。初めに頭金として売 価の1/4 を支払い。売価に分割手数料を加えた金額から頭金を差し引いた残額を各回に均等に分けて支払う。ただし、頭金の支払いは 分割払いの回数に含めないものとする。", "question": "5 回の分割払いとした場合、 売価の 1/ 8 が分割 手数料としてか かる。1回の支払い額は、売価のどれだけにあたるか。", "answer": "F(7/40)"}, {"category": "非言語", "problem": "パソコンを分割払いで購入することにした。初めに頭金として売 価の1/4 を支払い。売価に分割手数料を加えた金額から頭金を差し引いた残額を各回に均等に分けて支払う。ただし、頭金の支払いは 分割払いの回数に含めないものとする。", "question": "8回の分割払いとした場合、売価の5/ 36が分割手数料として かかる。5回目の支払いを終えたときの残額は、売価のどれだけにあたるか。", "answer": "I(4/9)"}, {"category": "非言語", "problem": "自転車、Pが時速9km、Qが時速36km,18分後、3分待機", "question": "XからZの距離", "answer": "6.0キロ"}, {"category": "非言語", "problem": "ある会社で、英120人、仏40人、独60人", "question": "3言語話せない人", "answer": "50人"}, {"category": "非言語", "problem": "ある会社で、英120人、仏40人、独60人", "question": "仏だけを話せる人の人数（独仏の2倍）", "answer": "10人（仏独5人）"}, {"category": "非言語", "problem": "A,B,C,D,Eの店舗が閉店する。18時、19時、20時、21時、22時、23時。Ⅰ)同じ時間には閉まらないⅡ)AとBは2時間違うⅢ)CはDより4時間早く閉まる", "question": "AとCは3時間の差がある。このとき、Bの閉店時間として考えられるものすべて選べ", "answer": "19,20,23時"}, {"category": "非言語", "problem": "A,B,C,D,Eの店舗が閉店する。18時、19時、20時、21時、22時、23時。Ⅰ)同じ時間には閉まらないⅡ)AとBは2時間違うⅢ)CはDより4時間早く閉まる", "question": "BとEは2時間の差がある。このとき、Aの閉店時間として考えられるものすべて選べ", "answer": "18,19,22,23時"}];
let deck=[],idx=0,isFlipped=false,results={},currentTab='all';
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function buildDeck(tab){
  if(tab==='all') return ALL_CARDS.map((_,i)=>i);
  if(tab==='wrong') return Object.keys(results).filter(k=>results[k]==='ng').map(Number);
  return ALL_CARDS.map((_,i)=>i).filter(i=>ALL_CARDS[i].category===tab);
}
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['all','言語','非言語','wrong'][i]===tab));
  deck=buildDeck(tab);idx=0;results={};
  updateBadges();showCard();
  document.getElementById('doneScreen').classList.remove('show');
  document.getElementById('mainArea').style.display='';
}
function shuffleDeck(){
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  idx=0;showCard();
}
function showCard(){
  if(!deck.length) return;
  const card=ALL_CARDS[deck[idx]];
  const num=idx+1,total=deck.length;
  document.getElementById('pText').textContent=num+' / '+total;
  document.getElementById('pFill').style.width=(num/total*100)+'%';
  document.getElementById('frontNum').textContent='#'+num;
  document.getElementById('backNum').textContent='#'+num;
  document.getElementById('frontLabel').textContent=card.category+' · 問題';
  // 表面：problem + question（設問）を必ず表示
  let front='';
  if(card.problem) front+=`<div class="problem-text">${esc(card.problem)}</div>`;
  if(card.question) front+=`<div class="question-box">${esc(card.question)}</div>`;
  front+=`<div class="tap-hint">タップして答えを見る</div>`;
  document.getElementById('frontBody').innerHTML=front;
  document.getElementById('backBody').innerHTML=`<div class="answer-text">${esc(card.answer)}</div>`;
  isFlipped=false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('resultBtns').classList.remove('show');
}
function flipCard(){
  isFlipped=!isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped',isFlipped);
  document.getElementById('resultBtns').classList.toggle('show',isFlipped);
}
function markResult(r){
  results[deck[idx]]=r;updateBadges();
  if(idx<deck.length-1){idx++;showCard();}else showDone();
}
function nextCard(){
  if(!isFlipped){flipCard();return;}
  if(idx<deck.length-1){idx++;showCard();}else showDone();
}
function prevCard(){
  if(isFlipped){flipCard();return;}
  if(idx>0){idx--;showCard();}
}
function updateBadges(){
  let ok=0,ng=0;
  Object.values(results).forEach(v=>{if(v==='ok')ok++;else if(v==='ng')ng++;});
  document.getElementById('badgeOk').textContent='✓ '+ok;
  document.getElementById('badgeNg').textContent='✗ '+ng;
  document.getElementById('badgeRem').textContent='☆ '+(deck.length-ok-ng);
}
function showDone(){
  let ok=0,ng=0;
  Object.values(results).forEach(v=>{if(v==='ok')ok++;else if(v==='ng')ng++;});
  document.getElementById('doneStats').innerHTML='正解: '+ok+' 問<br>不正解: '+ng+' 問<br>スキップ: '+(deck.length-ok-ng)+' 問<br>正答率: '+Math.round(ok/(deck.length||1)*100)+'%';
  document.getElementById('mainArea').style.display='none';
  document.getElementById('doneScreen').classList.add('show');
}
function restartDeck(){results={};idx=0;updateBadges();showCard();document.getElementById('doneScreen').classList.remove('show');document.getElementById('mainArea').style.display='';}
function reviewWrong(){switchTab('wrong');}
switchTab('all');
</script>
